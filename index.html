<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SURVIVAL MODE - 末日生存</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Black+Ops+One&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-color: #0a0a0a;
        --warning-red: #ff3333;
        --toxic-green: #00ff41;
        --amber: #ffaa00;
        --gray: #333;
        --light-gray: #888;
      }

      body {
        background-color: var(--bg-color);
        color: var(--toxic-green);
        font-family: "Share Tech Mono", monospace;
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
      }

      /* 噪点纹理 */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        opacity: 0.03;
        pointer-events: none;
        z-index: 1;
      }

      /* 扫描线 */
      body::after {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 255, 65, 0.03) 2px,
          rgba(0, 255, 65, 0.03) 4px
        );
        pointer-events: none;
        z-index: 2;
      }

      .container {
        position: relative;
        z-index: 10;
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      /* 警告条 */
      .warning-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: var(--warning-red);
        color: #000;
        padding: 8px;
        text-align: center;
        font-weight: bold;
        font-size: 14px;
        letter-spacing: 8px;
        animation: warningPulse 2s infinite;
        z-index: 100;
      }

      @keyframes warningPulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.7;
        }
      }

      /* 标题区域 */
      .header {
        text-align: center;
        margin-bottom: 40px;
        padding-top: 40px;
      }

      .alert-badge {
        display: inline-block;
        border: 2px solid var(--warning-red);
        color: var(--warning-red);
        padding: 8px 24px;
        font-size: 14px;
        letter-spacing: 6px;
        margin-bottom: 20px;
        animation: borderFlash 1.5s infinite;
      }

      @keyframes borderFlash {
        0%,
        100% {
          border-color: var(--warning-red);
          box-shadow: 0 0 10px rgba(255, 51, 51, 0.3);
        }
        50% {
          border-color: #ff6666;
          box-shadow: 0 0 20px rgba(255, 51, 51, 0.6);
        }
      }

      h1 {
        font-family: "Black Ops One", cursive;
        font-size: clamp(48px, 10vw, 96px);
        color: var(--toxic-green);
        text-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
        letter-spacing: 8px;
        line-height: 1;
      }

      .subtitle {
        color: var(--light-gray);
        font-size: 16px;
        letter-spacing: 4px;
        margin-top: 10px;
      }

      /* 倒计时区域 */
      .countdown-section {
        width: 100%;
        max-width: 900px;
        margin: 40px 0;
        padding: 40px;
        border: 1px solid rgba(0, 255, 65, 0.3);
        background: rgba(0, 255, 65, 0.02);
        position: relative;
      }

      .countdown-section::before {
        content: "COUNTDOWN";
        position: absolute;
        top: -12px;
        left: 20px;
        background: var(--bg-color);
        padding: 0 15px;
        color: var(--toxic-green);
        font-size: 14px;
        letter-spacing: 4px;
      }

      .countdown-display {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        flex-wrap: wrap;
      }

      .time-unit {
        text-align: center;
        min-width: 100px;
      }

      .time-value {
        font-family: "Black Ops One", cursive;
        font-size: clamp(48px, 8vw, 80px);
        color: var(--warning-red);
        text-shadow: 0 0 30px rgba(255, 51, 51, 0.6);
        line-height: 1;
        display: block;
        animation: numberPulse 1s infinite;
      }

      @keyframes numberPulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.85;
        }
      }

      .time-label {
        font-size: 14px;
        color: var(--light-gray);
        letter-spacing: 2px;
        margin-top: 10px;
      }

      .time-separator {
        font-family: "Black Ops One", cursive;
        font-size: clamp(36px, 6vw, 60px);
        color: var(--toxic-green);
        animation: blink 1s infinite;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      /* 日期信息区域 */
      .dates-section {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        width: 100%;
        max-width: 900px;
        margin: 20px 0;
      }

      .date-card {
        border: 1px solid var(--gray);
        padding: 24px;
        background: rgba(255, 255, 255, 0.02);
        position: relative;
        overflow: hidden;
      }

      .date-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 4px;
        height: 100%;
        background: var(--toxic-green);
      }

      .date-card.current::before {
        background: var(--amber);
      }

      .date-card.end::before {
        background: var(--warning-red);
      }

      .date-label {
        font-size: 12px;
        color: var(--light-gray);
        letter-spacing: 3px;
        margin-bottom: 8px;
      }

      .date-value {
        font-size: 20px;
        color: var(--toxic-green);
        font-weight: bold;
      }

      .date-card.current .date-value {
        color: var(--amber);
      }

      .date-card.end .date-value {
        color: var(--warning-red);
      }

      /* 进度条 */
      .progress-section {
        width: 100%;
        max-width: 900px;
        margin: 30px 0;
      }

      .progress-label {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: var(--light-gray);
        letter-spacing: 2px;
        margin-bottom: 10px;
      }

      .progress-bar {
        width: 100%;
        height: 8px;
        background: var(--gray);
        position: relative;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(
          90deg,
          var(--toxic-green) 0%,
          var(--warning-red) 100%
        );
        transition: width 0.3s ease;
        position: relative;
      }

      .progress-fill::after {
        content: "";
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: 20px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.3)
        );
        animation: progressShine 2s infinite;
      }

      @keyframes progressShine {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(100px);
        }
      }

      /* 激励语 */
      .motivation {
        margin-top: 40px;
        text-align: center;
        padding: 30px;
        border: 1px solid rgba(255, 51, 51, 0.3);
        max-width: 900px;
        width: 100%;
      }

      .motivation-text {
        font-size: 24px;
        color: var(--warning-red);
        text-transform: uppercase;
        letter-spacing: 4px;
        line-height: 1.6;
        text-shadow: 0 0 10px rgba(255, 51, 51, 0.3);
      }

      .survival-days {
        margin-top: 20px;
        font-size: 16px;
        color: var(--light-gray);
      }

      .survival-days span {
        color: var(--toxic-green);
        font-size: 32px;
        font-family: "Black Ops One", cursive;
      }

      /* 底部 */
      .footer {
        margin-top: 40px;
        text-align: center;
        color: var(--gray);
        font-size: 12px;
        letter-spacing: 2px;
      }

      /* 角落装饰 */
      .corner {
        position: fixed;
        width: 40px;
        height: 40px;
        border: 2px solid var(--toxic-green);
        z-index: 50;
      }

      .corner-tl {
        top: 40px;
        left: 20px;
        border-right: none;
        border-bottom: none;
      }
      .corner-tr {
        top: 40px;
        right: 20px;
        border-left: none;
        border-bottom: none;
      }
      .corner-bl {
        bottom: 20px;
        left: 20px;
        border-right: none;
        border-top: none;
      }
      .corner-br {
        bottom: 20px;
        right: 20px;
        border-left: none;
        border-top: none;
      }

      /* 响应式 */
      @media (max-width: 600px) {
        .countdown-display {
          gap: 10px;
        }
        .time-unit {
          min-width: 70px;
        }
        .dates-section {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="warning-bar">⚠ WARNING: SURVIVAL MODE ACTIVE ⚠</div>

    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="container">
      <header class="header">
        <div class="alert-badge">EMERGENCY PROTOCOL</div>
        <h1>SURVIVAL MODE</h1>
        <p class="subtitle">TIME IS RUNNING OUT. STAY FOCUSED.</p>
      </header>

      <section class="countdown-section">
        <div class="countdown-display">
          <div class="time-unit">
            <span class="time-value" id="days">000</span>
            <div class="time-label">DAYS</div>
          </div>
          <span class="time-separator">:</span>
          <div class="time-unit">
            <span class="time-value" id="hours">00</span>
            <div class="time-label">HOURS</div>
          </div>
          <span class="time-separator">:</span>
          <div class="time-unit">
            <span class="time-value" id="minutes">00</span>
            <div class="time-label">MINUTES</div>
          </div>
          <span class="time-separator">:</span>
          <div class="time-unit">
            <span class="time-value" id="seconds">00</span>
            <div class="time-label">SECONDS</div>
          </div>
        </div>
      </section>

      <section class="dates-section">
        <div class="date-card">
          <div class="date-label">MISSION START</div>
          <div class="date-value" id="startDate">--</div>
        </div>
        <div class="date-card current">
          <div class="date-label">CURRENT TIME</div>
          <div class="date-value" id="currentDate">--</div>
        </div>
        <div class="date-card end">
          <div class="date-label">DEADLINE</div>
          <div class="date-value" id="endDate">--</div>
        </div>
      </section>

      <section class="progress-section">
        <div class="progress-label">
          <span>PROGRESS</span>
          <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
      </section>

      <section class="motivation">
        <p class="motivation-text" id="motivationText">
          不要放弃。每一天都是生存之战。
        </p>
        <div class="survival-days">
          你已经坚持生存了 <span id="survivedDays">0</span> 天
        </div>
      </section>

      <footer class="footer">
        <p>SYSTEM STATUS: ONLINE // KEEP FIGHTING</p>
      </footer>
    </div>

    <script>
      // 配置你的日期
      const CONFIG = {
        startDate: "2026-03-08", // 开始日期
        endDate: "2026-04-01", // 结束日期（修改这里！）
      };

      // 激励语句库
      const motivations = [
        "不要放弃。每一天都是生存之战。",
        "时间不等人，行动起来！",
        "只有强者才能在这个世界生存。",
        "你的极限，远比你想象的要远。",
        "每一秒都很重要，不要浪费。",
        "坚持下去，黎明就在前方。",
        "现在不努力，未来只有后悔。",
        "你是自己命运的主宰。",
        "恐惧是弱点，行动是解药。",
        "生存，还是毁灭，取决于你的选择。",
      ];

      function pad(num) {
        return num.toString().padStart(2, "0");
      }

      function pad3(num) {
        return num.toString().padStart(3, "0");
      }

      function updateCountdown() {
        const now = new Date();
        const start = new Date(CONFIG.startDate);
        const end = new Date(CONFIG.endDate);

        // 计算剩余时间
        const diff = end - now;

        if (diff <= 0) {
          document.getElementById("days").textContent = "000";
          document.getElementById("hours").textContent = "00";
          document.getElementById("minutes").textContent = "00";
          document.getElementById("seconds").textContent = "00";
          document.getElementById("motivationText").textContent =
            "时间到。任务完成。";
          return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor(
          (diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60),
        );
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);

        document.getElementById("days").textContent = pad3(days);
        document.getElementById("hours").textContent = pad(hours);
        document.getElementById("minutes").textContent = pad(minutes);
        document.getElementById("seconds").textContent = pad(seconds);

        // 更新日期显示
        const options = { year: "numeric", month: "2-digit", day: "2-digit" };
        document.getElementById("startDate").textContent =
          start.toLocaleDateString("zh-CN", options);
        document.getElementById("currentDate").textContent =
          now.toLocaleDateString("zh-CN", options) +
          " " +
          pad(now.getHours()) +
          ":" +
          pad(now.getMinutes()) +
          ":" +
          pad(now.getSeconds());
        document.getElementById("endDate").textContent = end.toLocaleDateString(
          "zh-CN",
          options,
        );

        // 计算进度
        const total = end - start;
        const elapsed = now - start;
        const progress = Math.min(100, Math.max(0, (elapsed / total) * 100));
        document.getElementById("progressFill").style.width = progress + "%";
        document.getElementById("progressPercent").textContent =
          progress.toFixed(1) + "%";

        // 计算已生存天数
        const survived = Math.floor(elapsed / (1000 * 60 * 60 * 24));
        document.getElementById("survivedDays").textContent = survived;
      }

      // 随机切换激励语句
      function updateMotivation() {
        const randomIndex = Math.floor(Math.random() * motivations.length);
        document.getElementById("motivationText").textContent =
          motivations[randomIndex];
      }

      // 初始化
      updateCountdown();
      setInterval(updateCountdown, 1000);

      // 每30秒切换一次激励语
      updateMotivation();
      setInterval(updateMotivation, 30000);
    </script>
  </body>
</html>
